<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Age Calculator</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(120deg,#ff9a9e,#fad0c4);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:320px;
    text-align:center;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

input{
    width:100%;
    padding:10px;
    margin-top:15px;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    margin-top:15px;
    padding:10px;
    width:100%;
    border:none;
    background:#ff6b6b;
    color:white;
    font-size:16px;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#ff3b3b;
}

.result{
    margin-top:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">
<h2>Age Calculator</h2>

<label>Enter your Date of Birth</label>
<input type="date" id="dob">

<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="result"></div>
</div>

<script>
function calculateAge(){

let dob = document.getElementById("dob").value;

if(dob === ""){
    document.getElementById("result").innerHTML = "Please select a date";
    return;
}

let dobDate = new Date(dob);
let today = new Date();

if(dobDate > today){
    document.getElementById("result").innerHTML = "Please enter the correct date";
    return;
}

let age = today.getFullYear() - dobDate.getFullYear();
let monthDiff = today.getMonth() - dobDate.getMonth();

if(monthDiff < 0 || (monthDiff === 0 && today.getDate() < dobDate.getDate())){
    age--;
}

document.getElementById("result").innerHTML = "Your Age is: " + age + " years";
}
</script>

</body>
</html>
